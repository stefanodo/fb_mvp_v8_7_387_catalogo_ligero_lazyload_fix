<div class="actions mt wrap" id="validateReceiptSection">{% if receipt_detail.status=='PENDING' %}<form method="post" action="/receipt/{{receipt_detail.id}}/validate_form" style="display:inline"><button class="gold" type="submit">Validar (impacta stock)</button></form><form method="post" action="/receipt/{{receipt_detail.id}}/cancel_form" style="display:inline"><button type="submit">Cancelar</button></form><form method="post" action="/receipt/{{receipt_detail.id}}/reset_test_form" style="display:inline" onsubmit="return confirm('¿Resetear este albarán de prueba y borrar su impacto en stock?')"><button type="submit">Reset prueba</button></form>{% elif receipt_detail.status=='CONFIRMED' %}<form method="post" action="/receipt/{{receipt_detail.id}}/archive_form" style="display:inline" onsubmit="return confirm('¿Archivar este albarán confirmado?');"><button type="submit">Archivar confirmado</button></form><form method="post" action="/receipt/{{receipt_detail.id}}/delete_confirmed_form" style="display:inline" onsubmit="return confirm('¿Borrar este albarán confirmado y revertir su impacto en stock? Esta acción elimina también sus líneas y fotos.');"><button class="danger" type="submit">Borrar confirmado</button></form>{% elif receipt_detail.status=='ARCHIVED' %}<form method="post" action="/receipt/{{receipt_detail.id}}/restore_form" style="display:inline"><button type="submit">Restaurar archivado</button></form><form method="post" action="/receipt/{{receipt_detail.id}}/delete_confirmed_form" style="display:inline" onsubmit="return confirm('¿Borrar este albarán archivado y revertir su impacto en stock? Esta acción elimina también sus líneas y fotos.');"><button class="danger" type="submit">Borrar archivado</button></form>{% endif %}<a class="btn" href="/?page=albaranes&center_id={{selected_center_id}}">Cerrar</a></div>
