{% if minmax_item %}
<div class="panel mt" id="minmaxPanel">
  <h3>Editar Min/Max</h3>
  <form method="post" action="/item/{{minmax_item.id}}/minmax_form">
    <input type="hidden" name="center_id" value="{{ minmax_item.center_id or "" }}">
    <input type="hidden" name="warehouse_id" value="{{ minmax_item.warehouse_id or "" }}">
    <input type="hidden" name="stock_section" value="{{ stock_section or 'current_all' }}">
    <input type="hidden" name="stock_q" value="{{ stock_q or '' }}">
    <input type="hidden" name="stock_item_id" value="{{ stock_item_id_q or '' }}">
    <input type="hidden" name="stock_wh_id" value="{{ stock_wh_id_q or '' }}">
    <div class="row"><label>Artículo</label><input value="{{minmax_item.name}}" disabled></div>
    <div class="row"><label>Ámbito</label><input value="{{ (minmax_item.center_name ~ " · " ~ minmax_item.warehouse_name) if minmax_item.center_name and minmax_item.warehouse_name else "Global del artículo" }}" disabled></div>
    <div class="row"><label>Unidad base</label><input value="{{minmax_item.unit}}" disabled></div>
    <div class="row"><label>Mínimo</label>
      <div class="qtyline">
        <input type="number" step="0.001" name="min_qty" value="{{minmax_item.min_qty}}">
        <select name="min_unit">
          {% if minmax_item.unit=='g' %}
            <option value="kg">kg</option><option value="g" selected>g</option><option value="manojo">manojo</option>
          
          {% else %}
            <option value="{{minmax_item.unit}}" selected>{{minmax_item.unit}}</option>
          {% endif %}
        </select>
      </div>
    </div>
    <div class="row"><label>Máximo</label>
      <div class="qtyline">
        <input type="number" step="0.001" name="max_qty" value="{{minmax_item.max_qty}}">
        <select name="max_unit">
          {% if minmax_item.unit=='g' %}
            <option value="kg">kg</option><option value="g" selected>g</option><option value="manojo">manojo</option>
          
          {% else %}
            <option value="{{minmax_item.unit}}" selected>{{minmax_item.unit}}</option>
          {% endif %}
        </select>
      </div>
    </div>
    <div class="actions"><button type="submit" class="gold">Guardar</button>
      <a class="mini stock-mini-btn" href="/?page=stock&center_id={{selected_center_id}}&stock_section={{ stock_section or 'current_all' }}&stock_item_id={{ minmax_item.id }}{% if minmax_item.warehouse_id %}&stock_wh_id={{ minmax_item.warehouse_id }}{% endif %}{% if stock_q %}&stock_q={{ stock_q|urlencode }}{% endif %}#minmaxPanel">Cancelar</a>
    </div>
  </form>
</div>
<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  if(!params.get("minmax_item")) return;
  const panel = document.getElementById("minmaxPanel");
  if(!panel) return;
  requestAnimationFrame(()=>{ panel.scrollIntoView({behavior:"auto", block:"start"}); });
})();
</script>
{% endif %}
