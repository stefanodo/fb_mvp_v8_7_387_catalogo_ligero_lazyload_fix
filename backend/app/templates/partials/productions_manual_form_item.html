<div class="row"><label>Artículo</label>
  <input type="text" class="smart-item production-item-query" name="item_query" placeholder="Escribe para buscar artículo..." list="productionManualItemsDatalist" autocomplete="off" required />
  <input type="hidden" name="item_id" value="" data-smart-item-id="1" />
  <datalist id="productionManualItemsDatalist"></datalist>
  <div id="productionManualSuggest" class="smart-suggest-list"></div>
  <div class="hint">Escribe al menos 1 letra — se busca en el catálogo automáticamente.</div>
</div>
